alias: Presence Override Cleanup
description: >
  Polls sensor.light_variables every minute and fires presence_override_expired
  events for any automation instance whose manual override has timed out.
  Required companion for the Presence Light Control and Zone-Aware Presence
  Light Control blueprints. Install once — handles all blueprint instances.
mode: single
trigger:
  - platform: time_pattern
    minutes: "/1"
action:
  - repeat:
      for_each: >
        {{ (state_attr('sensor.light_variables', 'variables') | default({})).items() | list }}
      sequence:
        - condition: template
          value_template: >
            {% set vars = repeat.item[1] %}
            {% set override = vars.get('override_active', false) %}
            {% set until = vars.get('override_until', '') %}
            {{ override and until and as_timestamp(now()) >= as_timestamp(until) }}
        - event: presence_override_expired
          event_data:
            key: "{{ repeat.item[0] }}"
