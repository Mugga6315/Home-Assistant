blueprint:
  name: Presence Light Control
  description: Presence-based light automation with per-light brightness control using sensor.light_variables
  domain: automation
  input:
    target_lights:
      name: Light Entities
      description: One or more lights to control
      selector:
        entity:
          domain: light
          multiple: true

    presence_sensors:
      name: Presence Sensors
      selector:
        entity:
          domain: binary_sensor
          device_class:
            - occupancy
            - motion
          multiple: true

    motion_sensor:
      name: Motion Sensor (Optional)
      description: >
        Optional motion sensor that acts as an additional gate.
        When set, presence alone won't trigger lights — motion must also be active.
        The motion sensor itself also acts as a trigger.
      default:
      selector:
        entity:
          domain: binary_sensor
          device_class:
            - motion

    state_variable:
      name: State Storage Variable
      default: sensor.light_variables
      selector:
        entity:
          domain: sensor

    no_presence_timeout:
      name: No Presence Timeout (seconds)
      default: 5
      selector:
        number:
          min: 0
          max: 300
          step: 1

    default_brightness:
      name: Default Day Brightness (all lights)
      default: 255
      selector:
        number:
          min: 1
          max: 255
          step: 1

    enable_brightness_control:
      name: Enable Brightness Control
      description: Use different brightness levels for day/night
      default: false
      selector:
        boolean:

    night_mode_type:
      name: Night Mode Detection
      description: How to determine when to use lower brightness
      default: time
      selector:
        select:
          options:
            - label: Time-based (start/end time)
              value: time
            - label: Sensor-based (binary sensor state)
              value: sensor
          mode: dropdown

    night_sensor:
      name: Night Mode Sensor
      description: Binary sensor that indicates night mode (on = night)
      default:
      selector:
        entity:
          domain: binary_sensor

    night_start:
      name: Night Start Time
      default: "22:00:00"
      selector:
        time:

    night_end:
      name: Night End Time
      default: "06:00:00"
      selector:
        time:

    night_brightness:
      name: Default Night Brightness (all lights)
      default: 100
      selector:
        number:
          min: 1
          max: 255
          step: 1

    per_light_brightness:
      name: Per-Light Brightness Overrides
      description: >
        Override day/night brightness for specific lights.
        Must be a list — each entry requires entity_id, day_brightness, and night_brightness.
        Lights not listed use the global Default Day/Night Brightness values above.

        Example:
          - entity_id: light.kitchen_main
            day_brightness: 255
            night_brightness: 80
          - entity_id: light.kitchen_cabinet
            day_brightness: 180
            night_brightness: 40
      default: []
      selector:
        object:

    override_timeout:
      name: Manual Override Duration (minutes)
      description: How long manual control blocks automation
      default: 30
      selector:
        number:
          min: 1
          max: 120
          step: 1

    detect_manual_control:
      name: Detect Manual Control
      description: Pause automation when light is manually controlled
      default: true
      selector:
        boolean:

    additional_turn_on_condition:
      name: Additional Turn-On Condition
      description: >
        Optional template condition that must evaluate to true for lights to turn on when presence is detected.
        Leave the default ({{ true }}) to always allow turn-on.
        Examples:
          - {{ states('sensor.washer_power') | float < 5 }}
          - {{ is_state('input_boolean.guests_mode', 'off') }}
          - {{ states('sensor.illuminance') | float < 200 }}
      default: "{{ true }}"
      selector:
        template:

variables:
  target_lights: !input target_lights
  light_var_name: "{{ this.entity_id }}"
  state_var: !input state_variable
  presence_sensors: !input presence_sensors
  timeout: !input no_presence_timeout
  default_brightness: !input default_brightness
  brightness_control: !input enable_brightness_control
  night_mode_type: !input night_mode_type
  night_sensor: !input night_sensor
  night_start: !input night_start
  night_end: !input night_end
  night_brightness: !input night_brightness
  per_light_brightness: !input per_light_brightness
  override_timeout_minutes: !input override_timeout
  override_timeout: "{{ override_timeout_minutes * 60 }}"
  detect_manual: !input detect_manual_control
  motion_sensor: !input motion_sensor
  has_motion_sensor: "{{ motion_sensor not in [none, '', 'None'] }}"

  all_variables: "{{ state_attr(state_var, 'variables') | default({}) }}"
  light_vars: "{{ all_variables.get(light_var_name, {}) }}"

  lights_list: >
    {% if target_lights is string %}
      {{ [target_lights] }}
    {% else %}
      {{ target_lights }}
    {% endif %}

  per_light_map: >
    {% set ns = namespace(result={}) %}
    {% for entry in per_light_brightness %}
      {% if entry is mapping and entry.entity_id is defined %}
        {% set ns.result = ns.result | combine({
          entry.entity_id: {
            'day_brightness': entry.get('day_brightness', default_brightness),
            'night_brightness': entry.get('night_brightness', night_brightness)
          }
        }) %}
      {% endif %}
    {% endfor %}
    {{ ns.result }}

  is_night: >
    {% if brightness_control %}
      {% if night_mode_type == 'sensor' and night_sensor %}
        {{ is_state(night_sensor, 'on') }}
      {% else %}
        {% set current_time = now().strftime('%H:%M:%S') %}
        {% if night_start > night_end %}
          {{ current_time >= night_start or current_time < night_end }}
        {% else %}
          {{ current_time >= night_start and current_time < night_end }}
        {% endif %}
      {% endif %}
    {% else %}
      {{ false }}
    {% endif %}

  override_active: >
    {% set override = light_vars.get('override_active', false) %}
    {% set override_until = light_vars.get('override_until', '') %}
    {% if override and override_until %}
      {{ as_timestamp(now()) < as_timestamp(override_until) }}
    {% else %}
      {{ false }}
    {% endif %}

trigger_variables:
  motion_sensor_entity: !input motion_sensor

trigger:
  - platform: state
    entity_id: !input presence_sensors
    to: "on"
    id: presence_on

  - platform: state
    entity_id: !input presence_sensors
    to: "off"
    id: presence_off

  - platform: template
    value_template: >
      {{ motion_sensor_entity not in [none, '', 'None'] and
         is_state(motion_sensor_entity, 'on') }}
    id: motion_on

  - platform: state
    entity_id: !input target_lights
    id: light_changed

  - platform: time_pattern
    minutes: "/1"
    id: periodic_check

action:
  # Global guard: for light_changed triggers, only proceed if the change was caused by a human
  # (context.user_id is set). Automation-triggered changes always have user_id = none and are
  # dropped here, preventing mode:restart from canceling in-progress presence-off delays.
  - condition: template
    value_template: >
      {% if trigger.id == 'light_changed' %}
        {{ trigger.to_state.context.user_id is not none }}
      {% else %}
        {{ true }}
      {% endif %}

  - choose:
      # PRESENCE DETECTED
      - conditions:
          - condition: trigger
            id:
              - presence_on
              - motion_on
          - condition: template
            value_template: "{{ not override_active }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ has_motion_sensor }}"
            then:
              - if:
                  - condition: trigger
                    id: motion_on
                then:
                  # PIR triggered: wait briefly for a presence sensor to confirm.
                  # PIR is already on (it caused this trigger), so only presence is awaited.
                  # continue_on_timeout: false ensures the sequence aborts on timeout —
                  # do not rely solely on wait.completed being false.
                  - wait_template: >
                      {{ expand(presence_sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
                    timeout:
                      seconds: 3
                    continue_on_timeout: false
                else:
                  # Presence triggered: PIR must be currently active to gate the turn-on.
                  # If PIR is off, presence alone is not enough to turn on lights.
                  - condition: template
                    value_template: "{{ is_state(motion_sensor, 'on') }}"
            else:
              - condition: template
                value_template: >
                  {{ expand(presence_sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
          - condition: template
            value_template: !input additional_turn_on_condition

          - event: set_variable
            event_data:
              key: "{{ light_var_name }}"
              value:
                last_presence: "{{ now().isoformat() }}"
                presence_state: "on"
                last_action: "{{ now().isoformat() }}"
                last_triggered_by: "{{ trigger.entity_id }}"
                override_active: false
                override_until: ""

          - repeat:
              for_each: "{{ lights_list }}"
              sequence:
                - variables:
                    this_light: "{{ repeat.item }}"
                    this_brightness: >
                      {% if is_night %}
                        {{ per_light_map.get(this_light, {}).get('night_brightness', night_brightness) }}
                      {% else %}
                        {{ per_light_map.get(this_light, {}).get('day_brightness', default_brightness) }}
                      {% endif %}
                - service: light.turn_on
                  target:
                    entity_id: "{{ this_light }}"
                  data:
                    brightness: "{{ this_brightness }}"

      # PRESENCE CLEARED
      - conditions:
          - condition: trigger
            id: presence_off
          - condition: template
            value_template: "{{ not override_active }}"
        sequence:
          - delay:
              seconds: "{{ timeout }}"

          - condition: template
            value_template: >
              {{ expand(presence_sensors) | selectattr('state', 'eq', 'on') | list | count == 0 }}

          - event: set_variable
            event_data:
              key: "{{ light_var_name }}"
              value:
                last_presence: "{{ now().isoformat() }}"
                presence_state: "off"
                last_action: "{{ now().isoformat() }}"
                last_triggered_by: "timeout"
                override_active: false
                override_until: ""

          - service: light.turn_off
            target:
              entity_id: "{{ lights_list }}"

      # MANUAL CONTROL DETECTED
      # Only trigger on actual human actions - require user_id to be set.
      # This ensures automation-triggered state changes are never treated as manual control.
      - conditions:
          - condition: trigger
            id: light_changed
          - condition: template
            value_template: "{{ detect_manual }}"
          - condition: template
            value_template: "{{ trigger.to_state.context.user_id is not none }}"
        sequence:
          - event: set_variable
            event_data:
              key: "{{ light_var_name }}"
              value:
                override_active: true
                override_until: "{{ (now() + timedelta(seconds=override_timeout)).isoformat() }}"
                last_action: "{{ now().isoformat() }}"
                last_triggered_by: "manual"

      # PERIODIC CHECK - CLEAR EXPIRED OVERRIDES
      - conditions:
          - condition: trigger
            id: periodic_check
          - condition: template
            value_template: "{{ light_vars.get('override_active', false) }}"
          - condition: template
            value_template: >
              {% set override_until = light_vars.get('override_until', '') %}
              {{ override_until and (as_timestamp(now()) >= as_timestamp(override_until)) }}
        sequence:
          - event: set_variable
            event_data:
              key: "{{ light_var_name }}"
              value:
                override_active: false
                override_until: ""
                last_action: "{{ now().isoformat() }}"

          - if:
              - condition: template
                value_template: >
                  {{ expand(presence_sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
            then:
              # Presence still active — restore automation brightness
              - repeat:
                  for_each: "{{ lights_list }}"
                  sequence:
                    - variables:
                        this_light: "{{ repeat.item }}"
                        this_brightness: >
                          {% if is_night %}
                            {{ per_light_map.get(this_light, {}).get('night_brightness', night_brightness) }}
                          {% else %}
                            {{ per_light_map.get(this_light, {}).get('day_brightness', default_brightness) }}
                          {% endif %}
                    - service: light.turn_on
                      target:
                        entity_id: "{{ this_light }}"
                      data:
                        brightness: "{{ this_brightness }}"
            else:
              # No presence — turn off lights
              - event: set_variable
                event_data:
                  key: "{{ light_var_name }}"
                  value:
                    presence_state: "off"
                    last_action: "{{ now().isoformat() }}"
                    last_triggered_by: "override_expired"
              - service: light.turn_off
                target:
                  entity_id: "{{ lights_list }}"

      # PERIODIC CHECK - RECOVERY
      # Catches the case where the presence-off delay was canceled by a mode:restart
      # (e.g., by the periodic_check itself or a human light change that set the override
      # but presence already cleared before override was activated).
      # Conditions: no active override, presence has been gone longer than the timeout,
      # and at least one managed light is still on.
      - conditions:
          - condition: trigger
            id: periodic_check
          - condition: template
            value_template: "{{ not light_vars.get('override_active', false) }}"
          - condition: template
            value_template: >
              {{ expand(presence_sensors) | selectattr('state', 'eq', 'on') | list | count == 0 }}
          - condition: template
            value_template: >
              {{ expand(lights_list) | selectattr('state', 'eq', 'on') | list | count > 0 }}
          - condition: template
            value_template: >
              {% set last_presence = light_vars.get('last_presence', '') %}
              {% if last_presence %}
                {{ as_timestamp(now()) - as_timestamp(last_presence) >= timeout }}
              {% else %}
                {{ false }}
              {% endif %}
        sequence:
          - event: set_variable
            event_data:
              key: "{{ light_var_name }}"
              value:
                presence_state: "off"
                last_action: "{{ now().isoformat() }}"
                last_triggered_by: "periodic_recovery"
          - service: light.turn_off
            target:
              entity_id: "{{ lights_list }}"

mode: restart
