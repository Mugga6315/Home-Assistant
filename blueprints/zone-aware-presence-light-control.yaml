blueprint:
  name: Zone-Aware Presence Light Control
  description: >
    Presence-based light automation that adjusts brightness per-zone.
    Each zone sensor maps to a brightness level per light — when multiple zones
    are active, the highest priority zone wins. Uses zone sensors directly for
    on/off detection so the automation is self-contained and not affected by
    unrelated sensors elsewhere in the house.
  domain: automation
  input:
    target_lights:
      name: Light Entities
      description: One or more lights to control
      selector:
        entity:
          domain: light
          multiple: true

    zone_sensors:
      name: Zone Sensors
      description: >
        All individual presence/occupancy sensors to watch. These are the
        ESPHome mmWave sensors already exposed to HA (e.g. binary_sensor.msensor_flur_occupancy).
        When any of these is on, lights turn on. When all are off, lights turn off.
      selector:
        entity:
          domain: binary_sensor
          device_class:
            - occupancy
            - motion
          multiple: true

    zone_rules:
      name: Zone Rules
      description: >-
        List of zone-to-brightness mappings. When multiple zones are active, the rule with the highest priority wins. Paste the following as a starting point and adjust entity IDs and brightness values:

        - zone_sensors:
            - binary_sensor.msensor_flur_occupancy
          priority: 10
          per_light:
            - entity_id: light.corridor_1
              day_brightness: 255
              night_brightness: 150
            - entity_id: light.corridor_2
              day_brightness: 200
              night_brightness: 100
        - zone_sensors:
            - binary_sensor.msensor_wohnzimmer_occupancy
            - binary_sensor.msensor_wc_occupancy
          priority: 5
          per_light:
            - entity_id: light.corridor_1
              day_brightness: 51
              night_brightness: 30
            - entity_id: light.corridor_2
              day_brightness: 127
              night_brightness: 60
      default: []
      selector:
        object:

    state_variable:
      name: State Storage Variable
      default: sensor.light_variables
      selector:
        entity:
          domain: sensor

    no_presence_timeout:
      name: No Presence Timeout (seconds)
      default: 0
      selector:
        number:
          min: 0
          max: 300
          step: 5

    default_brightness:
      name: Default Day Brightness
      description: Fallback brightness when no zone rule matches
      default: 255
      selector:
        number:
          min: 1
          max: 255
          step: 1

    enable_brightness_control:
      name: Enable Brightness Control
      description: Use different brightness levels for day/night
      default: false
      selector:
        boolean:

    night_mode_type:
      name: Night Mode Detection
      description: How to determine when to use lower brightness
      default: time
      selector:
        select:
          options:
            - label: Time-based (start/end time)
              value: time
            - label: Sensor-based (binary sensor state)
              value: sensor
          mode: dropdown

    night_sensor:
      name: Night Mode Sensor
      description: Binary sensor that indicates night mode (on = night)
      default:
      selector:
        entity:
          domain: binary_sensor

    night_start:
      name: Night Start Time
      default: "22:00:00"
      selector:
        time:

    night_end:
      name: Night End Time
      default: "06:00:00"
      selector:
        time:

    night_brightness:
      name: Default Night Brightness
      default: 100
      selector:
        number:
          min: 1
          max: 255
          step: 1

    override_timeout:
      name: Manual Override Duration (minutes)
      description: How long manual control blocks automation
      default: 30
      selector:
        number:
          min: 1
          max: 120
          step: 1

    detect_manual_control:
      name: Detect Manual Control
      description: Pause automation when light is manually controlled
      default: true
      selector:
        boolean:

    additional_turn_on_condition:
      name: Additional Turn-On Condition
      description: >
        Optional template condition that must evaluate to true for lights to turn on.
        Leave the default ({{ true }}) to always allow turn-on.
      default: "{{ true }}"
      selector:
        template:

variables:
  target_lights: !input target_lights
  light_var_name: "{{ this.entity_id }}"
  state_var: !input state_variable
  zone_sensors: !input zone_sensors
  zone_rules: !input zone_rules
  timeout: !input no_presence_timeout
  default_brightness: !input default_brightness
  brightness_control: !input enable_brightness_control
  night_mode_type: !input night_mode_type
  night_sensor: !input night_sensor
  night_start: !input night_start
  night_end: !input night_end
  night_brightness: !input night_brightness
  override_timeout_minutes: !input override_timeout
  override_timeout: "{{ override_timeout_minutes * 60 }}"
  detect_manual: !input detect_manual_control

  all_variables: "{{ state_attr(state_var, 'variables') | default({}) }}"
  light_vars: "{{ all_variables.get(light_var_name, {}) }}"

  lights_list: >
    {% if target_lights is string %}
      {{ [target_lights] }}
    {% else %}
      {{ target_lights }}
    {% endif %}

  is_night: >
    {% if brightness_control %}
      {% if night_mode_type == 'sensor' and night_sensor %}
        {{ is_state(night_sensor, 'on') }}
      {% else %}
        {% set current_time = now().strftime('%H:%M:%S') %}
        {% if night_start > night_end %}
          {{ current_time >= night_start or current_time < night_end }}
        {% else %}
          {{ current_time >= night_start and current_time < night_end }}
        {% endif %}
      {% endif %}
    {% else %}
      {{ false }}
    {% endif %}

  override_active: >
    {% set override = light_vars.get('override_active', false) %}
    {% set override_until = light_vars.get('override_until', '') %}
    {% if override and override_until %}
      {{ as_timestamp(now()) < as_timestamp(override_until) }}
    {% else %}
      {{ false }}
    {% endif %}

  # Highest-priority active zone's per_light list
  active_zone_per_light: >
    {% set ns = namespace(best=-1, result=[]) %}
    {% for rule in zone_rules %}
      {% set sensors = rule.zone_sensors | default([]) %}
      {% set any_on = expand(sensors) | selectattr('state', 'eq', 'on') | list | count > 0 %}
      {% set prio = rule.priority | default(0) | int %}
      {% if any_on and prio > ns.best %}
        {% set ns.best = prio %}
        {% set ns.result = rule.per_light | default([]) %}
      {% endif %}
    {% endfor %}
    {{ ns.result }}

  # Map of entity_id → {day_brightness, night_brightness} from winning zone
  zone_light_map: >
    {% set ns = namespace(result={}) %}
    {% for entry in active_zone_per_light %}
      {% if entry is mapping and entry.entity_id is defined %}
        {% set ns.result = ns.result | combine({
          entry.entity_id: {
            'day_brightness': entry.day_brightness | default(default_brightness),
            'night_brightness': entry.night_brightness | default(night_brightness)
          }
        }) %}
      {% endif %}
    {% endfor %}
    {{ ns.result }}

trigger:
  - platform: state
    entity_id: !input zone_sensors
    id: zone_changed

  - platform: state
    entity_id: !input target_lights
    id: light_changed

  - platform: time_pattern
    minutes: "/1"
    id: periodic_check

action:
  # Global guard: drop automation-triggered light_changed events.
  # Only human actions (context.user_id set) pass through.
  - condition: template
    value_template: >
      {% if trigger.id == 'light_changed' %}
        {{ trigger.to_state.context.user_id is not none }}
      {% else %}
        {{ true }}
      {% endif %}

  - choose:
      # ANY ZONE BECAME OCCUPIED
      - conditions:
          - condition: trigger
            id: zone_changed
          - condition: template
            value_template: >
              {{ expand(zone_sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
          - condition: template
            value_template: "{{ not override_active }}"
        sequence:
          - if:
              # Only turn on if automation hasn't already turned them on
              - condition: template
                value_template: "{{ light_vars.get('presence_state', 'off') == 'off' }}"
            then:
              - condition: template
                value_template: !input additional_turn_on_condition

              - event: set_variable
                event_data:
                  key: "{{ light_var_name }}"
                  value:
                    last_presence: "{{ now().isoformat() }}"
                    presence_state: "on"
                    last_action: "{{ now().isoformat() }}"
                    last_triggered_by: "{{ trigger.entity_id }}"
                    override_active: false
                    override_until: ""

              - repeat:
                  for_each: "{{ lights_list }}"
                  sequence:
                    - variables:
                        this_light: "{{ repeat.item }}"
                        this_brightness: >
                          {% if is_night %}
                            {{ zone_light_map.get(this_light, {}).get('night_brightness', night_brightness) }}
                          {% else %}
                            {{ zone_light_map.get(this_light, {}).get('day_brightness', default_brightness) }}
                          {% endif %}
                    - service: light.turn_on
                      target:
                        entity_id: "{{ this_light }}"
                      data:
                        brightness: "{{ this_brightness }}"

            else:
              # Lights already on — zone changed, update brightness only
              - repeat:
                  for_each: "{{ lights_list }}"
                  sequence:
                    - variables:
                        this_light: "{{ repeat.item }}"
                        this_brightness: >
                          {% if is_night %}
                            {{ zone_light_map.get(this_light, {}).get('night_brightness', night_brightness) }}
                          {% else %}
                            {{ zone_light_map.get(this_light, {}).get('day_brightness', default_brightness) }}
                          {% endif %}
                    - service: light.turn_on
                      target:
                        entity_id: "{{ this_light }}"
                      data:
                        brightness: "{{ this_brightness }}"

      # ALL ZONES CLEARED
      - conditions:
          - condition: trigger
            id: zone_changed
          - condition: template
            value_template: >
              {{ expand(zone_sensors) | selectattr('state', 'eq', 'on') | list | count == 0 }}
          - condition: template
            value_template: "{{ not override_active }}"
        sequence:
          - event: set_variable
            event_data:
              key: "{{ light_var_name }}"
              value:
                last_presence: "{{ now().isoformat() }}"

          - delay:
              seconds: "{{ timeout }}"

          # Re-check: no zone should have come back during the delay
          - condition: template
            value_template: >
              {{ expand(zone_sensors) | selectattr('state', 'eq', 'on') | list | count == 0 }}

          - event: set_variable
            event_data:
              key: "{{ light_var_name }}"
              value:
                presence_state: "off"
                last_action: "{{ now().isoformat() }}"
                last_triggered_by: "timeout"
                override_active: false
                override_until: ""

          - service: light.turn_off
            target:
              entity_id: "{{ lights_list }}"

      # MANUAL CONTROL DETECTED
      - conditions:
          - condition: trigger
            id: light_changed
          - condition: template
            value_template: "{{ detect_manual }}"
          - condition: template
            value_template: "{{ trigger.to_state.context.user_id is not none }}"
        sequence:
          - event: set_variable
            event_data:
              key: "{{ light_var_name }}"
              value:
                override_active: true
                override_until: "{{ (now() + timedelta(seconds=override_timeout)).isoformat() }}"
                last_action: "{{ now().isoformat() }}"
                last_triggered_by: "manual"

      # PERIODIC CHECK - CLEAR EXPIRED OVERRIDES
      - conditions:
          - condition: trigger
            id: periodic_check
          - condition: template
            value_template: "{{ light_vars.get('override_active', false) }}"
          - condition: template
            value_template: >
              {% set override_until = light_vars.get('override_until', '') %}
              {{ override_until and (as_timestamp(now()) >= as_timestamp(override_until)) }}
        sequence:
          - event: set_variable
            event_data:
              key: "{{ light_var_name }}"
              value:
                override_active: false
                override_until: ""
                last_action: "{{ now().isoformat() }}"

          - if:
              - condition: template
                value_template: >
                  {{ expand(zone_sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
            then:
              # Presence still active — restore automation brightness
              - repeat:
                  for_each: "{{ lights_list }}"
                  sequence:
                    - variables:
                        this_light: "{{ repeat.item }}"
                        this_brightness: >
                          {% if is_night %}
                            {{ zone_light_map.get(this_light, {}).get('night_brightness', night_brightness) }}
                          {% else %}
                            {{ zone_light_map.get(this_light, {}).get('day_brightness', default_brightness) }}
                          {% endif %}
                    - service: light.turn_on
                      target:
                        entity_id: "{{ this_light }}"
                      data:
                        brightness: "{{ this_brightness }}"
            else:
              # No presence — turn off lights
              - event: set_variable
                event_data:
                  key: "{{ light_var_name }}"
                  value:
                    presence_state: "off"
                    last_action: "{{ now().isoformat() }}"
                    last_triggered_by: "override_expired"
              - service: light.turn_off
                target:
                  entity_id: "{{ lights_list }}"

      # PERIODIC CHECK - RECOVERY
      # Guards against presence-off delays canceled by mode:restart.
      # Fires when: no override, all zones clear for longer than timeout, light still on.
      - conditions:
          - condition: trigger
            id: periodic_check
          - condition: template
            value_template: "{{ not light_vars.get('override_active', false) }}"
          - condition: template
            value_template: >
              {{ expand(zone_sensors) | selectattr('state', 'eq', 'on') | list | count == 0 }}
          - condition: template
            value_template: >
              {{ expand(lights_list) | selectattr('state', 'eq', 'on') | list | count > 0 }}
          - condition: template
            value_template: >
              {% set last_presence = light_vars.get('last_presence', '') %}
              {% if last_presence %}
                {{ as_timestamp(now()) - as_timestamp(last_presence) >= timeout }}
              {% else %}
                {{ false }}
              {% endif %}
        sequence:
          - event: set_variable
            event_data:
              key: "{{ light_var_name }}"
              value:
                presence_state: "off"
                last_action: "{{ now().isoformat() }}"
                last_triggered_by: "periodic_recovery"
          - service: light.turn_off
            target:
              entity_id: "{{ lights_list }}"

mode: restart
